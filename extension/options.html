<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YouTube Audio Downloader Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <main>
    <h1>Downloader Settings</h1>
    <p>These values are saved to the Python server via <code>/settings</code>.</p>

    <form id="settingsForm">
      <label>Server Host
        <input name="host" required />
      </label>

      <label>Server Port
        <input name="port" type="number" min="1" max="65535" required />
      </label>

      <label>MP3 Quality (kbps)
        <input name="audio_quality" type="number" min="64" max="320" required />
      </label>

      <label>Download Directory
        <input name="download_dir" required />
      </label>

      <label>Retries
        <input name="retries" type="number" min="0" max="50" required />
      </label>

      <label>Fragment Retries
        <input name="fragment_retries" type="number" min="0" max="50" required />
      </label>

      <div class="actions">
        <button type="submit">Save Settings</button>
        <button type="button" id="reloadBtn">Reload</button>
      </div>
    </form>

    <p id="status" aria-live="polite"></p>
  </main>
  <script src="options.js"></script>
</body>
</html>
